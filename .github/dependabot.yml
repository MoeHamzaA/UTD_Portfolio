version: 2
updates:
  # JavaScript dependencies (package.json / bun.lock).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk updates into a single PR to cut noise.
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'

  # GitHub Actions versions used in workflows.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types:
          - 'minor'
          - 'patch'
